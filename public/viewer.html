<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>BREMEN BACKYARD</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      min-height: 100svh;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    }
    .wrap {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 18px 12px;
      box-sizing: border-box;
      gap: 10px;
    }
    .title {
      font-size: 11px;
      letter-spacing: 0.28em;
      font-weight: 600;
      margin: 0;
      color: rgba(255, 255, 255, 0.85);
    }
    .img-box {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 0;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      display: block;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 8px 36px rgba(0, 0, 0, 0.6);
    }
    .hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.04em;
      text-align: center;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">BREMEN BACKYARD</h1>
    <div class="img-box">
      <img id="v" alt="" />
    </div>
    <p class="hint">이미지를 눌러 저장해 보세요</p>
  </div>
  <script>
    const url = new URLSearchParams(location.search).get('img');
    if (url) document.getElementById('v').src = url;
  </script>
</body>
</html>
